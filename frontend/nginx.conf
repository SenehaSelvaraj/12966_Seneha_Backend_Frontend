server {
    listen 80;
 
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This makes React Router work — all routes go to index.html
        try_files $uri $uri/ /index.html;
    }
 
    # Proxy API calls to each backend service
    location /api/users/ {
        proxy_pass http://user-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
 
    location /api/items/ {
        proxy_pass http://item-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
 