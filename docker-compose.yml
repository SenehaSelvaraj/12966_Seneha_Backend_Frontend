
 
services:
 
  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db_1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: lost_found_db
    ports:
      - "3307:3306"   # 3307 on your machine, 3306 inside container
                      # use 3307 so it doesn't clash with local MySQL
    volumes:
      - mysql-data:/var/lib/mysql   # data persists even if container restarts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # User Service
  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service_1
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/lost_found_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
    depends_on:
      mysql-db:
        condition: service_healthy   # wait for MySQL to be ready
 
  # Item Service
  item-service:
    build:
      context: ./ItemService
      dockerfile: Dockerfile
    container_name: item-service_1
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/lost_found_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
    depends_on:
      mysql-db:
        condition: service_healthy
 
  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_1
    restart: always
    ports:
      - "80:80"   # access app at http://localhost
    depends_on:
      - user-service
      - item-service
 
# Named volume so MySQL data is not lost on restart
volumes:
  mysql-data:
 
